# ============================================================
# VERSIONING RULES (Reference)
# ============================================================
# Ref: .agent/workflows/version-control.md
# 
# MAJOR (X.0.0): Breaking changes, architectural paradigm shift
# MINOR (0.Y.0): New features, new modules (backwards compatible)
# PATCH (0.0.Z): Bug fixes, performance improvements
#
# ALL version changes MUST be logged here with:
# - timestamp
# - system_id
# - version_from / version_to
# - change_type (MAJOR/MINOR/PATCH)
# - reason (WHY this change)
# - changed_by (who approved)
# - files_affected (complete list)
# - rollback_command (how to undo)
# - git_commit (reference)
# ============================================================

# Template for new entries (add to top of changes list):
# - timestamp: YYYY-MM-DDTHH:MM:SS+07:00
#   system_id: [System ID from registry]
#   version_from: X.Y.Z
#   version_to: X.Y.Z
#   change_type: MAJOR | MINOR | PATCH
#   reason: "[Clear explanation of WHY]"
#   changed_by: [Name/Role]
#   files_affected:
#     - [file path 1]
#     - [file path 2]
#   rollback_command: >
#     [Step-by-step rollback instructions]
#   git_commit: "[Commit message]"
#   approved: true | false
