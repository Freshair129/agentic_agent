schema: EVA-MasterRegistry-v9.6
version: 9.6.0
updated: 2026-01-17
description: >
  The ULTIMATE Registry (The Map & The Law combined).
  Defines Existence (Topology), Structure (Manifest), and Rights (Permissions).
  Single Source of Truth for Subagent Auditing.

# ============================================================
# 1. GLOBAL POLICIES (The Constitution)
# ============================================================
policies:
  governance:
    root_slot_strictness: true    # Only root_slots allowed at agent/
    manifest_enforcement: true    # Files must match manifest
  
  memory:
    flow_direction: "Forward-Only"
    archive_immutability: true
    state_isolation: true

  # [Criticality Levels: The Hierarchy of Needs]
  criticality:
    L0: "CRITICAL_ANCHOR - System Halt (Death)"                 # Physio, Orch, Bus
    L1: "CORE_ESSENTIAL - Safe Mode (Severe Degradation)"       # Matrix, MSP (Identity)
    L2: "FUNCTIONAL_REQUIRED - Featured Disabled (Capability Loss)" # RAG, GKS, Qualia
    L3: "OPTIONAL_ENHANCEMENT - Log Warning (Ignorable)"        # Tools, Experiments


# ============================================================
# 2. ROOT SLOT WHITE LIST (The Land)
# ============================================================
root_slots:
  - .agent             # Agent rules, workflows, and subagent configs
  - registry
  - contracts
  - docs
  - operation_system
  - physio_core
  - eva_matrix
  - memory_n_soul_passport
  - orchestrator
  - genesis_knowledge_system
  - resonance_memory_system
  - artifact_qualia
  - api               # Web/Socket Layer
  - capabilities      # Tools/Skills
  - consciousness     # Active State
  - data              # Static Assets
  - memory            # Archival Storage
  - scripts           # Verification & utility scripts
  - tests             # Verification Suite
  - tools             # Technician Subagents

# ============================================================
# 3. SYSTEMS REGISTRY (The Citizens)
# ============================================================
systems:
  # ----------------------------------------------------------
  # 1. BIOLOGICAL DOMAIN (PhysioCore)
  # ----------------------------------------------------------
  - id: PhysioCore
    name: Physiological_Core
    version: 2.4.3  # Maps from EVA 9.4.3 (9.x -> 2.x per ADR-011)
    domain: biological
    role: system_authority
    
    # [Manifest: Structure]
    # NOTE: PhysioCore is a STRUCTURAL EXCEPTION (ADR-015, ADR-017)
    # Uses legacy logic/ directory, not v9.4.3 Module/Node structure
    # Reason: Verified Stable + Performance Critical (30Hz loop)
    structure_standard: exception
    exception_reason: "Performance critical (30Hz loop), Verified Stable, ADR-015"
    root_presence: true
    manifest:
      follows_standard: false
      config_location: local
      folders:
        - physio_core/logic           # Legacy structure (22 files)
        - physio_core/configs
        - physio_core/contract
        - physio_core/schema
        - physio_core/validation
        - physio_core/tests
      files:
        - physio_core/physio_core.py
        - physio_core/__init__.py
    
    # [Permissions: Rights]
    permissions:
      bus_publish: [BUS_PHYSICAL]
      bus_subscribe: []
      state_ownership: [physio_core_state.json]
    
    # [Dependencies: Needs]
    dependencies: [] # Foundational System (No external deps)
    
    # [Components: Modules]
    modules:
      - id: Endocrine_Engine
        type: functional_module
        domain: biological.endocrine
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]
      
      - id: Blood_Engine
        type: functional_module
        domain: biological.blood
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]

      - id: ANS_Engine
        type: functional_module
        domain: biological.autonomic
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]

      - id: Vitals_Engine
        type: functional_module
        domain: biological.vitals
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]

  # ----------------------------------------------------------
  # 2. PSYCHOLOGICAL DOMAIN (Matrix)
  # ----------------------------------------------------------
  - id: EVA_Matrix
    name: EVA_Matrix
    version: 2.4.3  # Maps from EVA 9.4.3
    domain: psychological
    role: core_system
    
    structure_standard: v9.4.3
    root_presence: true
    manifest:
      follows_standard: true
      config_location: local
      folders: [eva_matrix/Module]  # Note: Module/ exists, Node/ needed
      files: [eva_matrix/eva_matrix.py]
      
    permissions:
      bus_publish: [BUS_PSYCHOLOGICAL]
      bus_subscribe: [BUS_PHYSICAL]
      state_ownership: [eva_matrix_state.json]
    
    dependencies:
      - system: PhysioCore # via BUS_PHYSICAL
    
    modules:
      - id: MatrixPsychModule
        type: logic_node
        dependencies: [system: EVA_Matrix]
        permissions:
          bus_subscribe: [BUS_PHYSICAL]
          bus_publish: [BUS_PSYCHOLOGICAL]

  # ----------------------------------------------------------
  # 3. MEMORY DOMAIN (MSP)
  # ----------------------------------------------------------
  - id: MSP
    name: Memory_Soul_Passport
    version: 2.1.0  # Updated from 1.1.0 (2026-01-18: Version Control Baseline)
    domain: memory_persistence
    role: core_system
    
    # NOTE: MSP is a STRUCTURAL EXCEPTION (ADR-015, ADR-017)
    # Reason: Legacy system, 2454 lines, memory engine complexity, Verified Stable
    structure_standard: exception
    exception_reason: "Legacy memory engine (2454 lines), Verified Stable, ADR-015"
    root_presence: true
    manifest:
      follows_standard: false
      config_location: local
      folders: [memory_n_soul_passport/modules]
      files: [memory_n_soul_passport/memory_n_soul_passport_engine.py]
      
    permissions:
      bus_publish: []
      bus_subscribe: [BUS_ALL] # Special right
      state_ownership: []      # MSP owns storage, not state
    
    dependencies:
      - system: Resonance_Bus
      - service: Vector_Bridge
      
    modules:
      - id: Episodic_Memory
        type: storage_module
        dependencies: [system: MSP]
      - id: Semantic_Memory
        type: storage_module
        dependencies: [system: MSP, service: ChromaBridge]
        permissions:
          fs_write: [memory/semantic_memory]

    chains:
      folders: [memory_n_soul_passport/memory]
      files: []


  # ----------------------------------------------------------
  # 4. ORCHESTRATION DOMAIN (CNS)
  # ----------------------------------------------------------
  - id: Orchestrator
    name: EVA_Orchestrator
    version: 1.2.0  # Independent versioning (legacy system)
    domain: central_nervous_system
    role: system_authority
    
    # NOTE: Orchestrator is a STRUCTURAL EXCEPTION (ADR-017)
    # Reason: Central control (931 lines + 49 CIM files), 3-Phase flow complexity, tightly coupled
    structure_standard: exception
    exception_reason: "Central control system (931 lines + 49 CIM files), highly coupled to all systems"
    root_presence: true
    manifest:
      follows_standard: false
      config_location: local
      folders: [orchestrator/cim, orchestrator/session_manager]
      files: [orchestrator/orchestrator.py]
      
    permissions:
      bus_publish: [BUS_OPERATIONAL]
      bus_subscribe: [BUS_ALL]
      state_ownership: [cim_state.json]
      
    dependencies:
      - system: PhysioCore
      - system: EVA_Matrix
      - system: MSP
      - system: GKS
      - system: RMS
      
    modules:
      - id: CIM
        type: core_system
        dependencies: [system: Orchestrator]
        permissions:
          bus_publish: [BUS_OPERATIONAL]

  # ----------------------------------------------------------
  # 5. INFRASTRUCTURE & KNOWLEDGE
  # ----------------------------------------------------------
  - id: GKS
    name: Genesis_Knowledge_System
    version: 2.0.0  # Maps from EVA 9.0.0 (introduced in v9)\n    domain: epistemology
    role: knowledge_authority
    criticality: L2 # Ignorant (Cant access wisdom)
    
    structure_standard: v9.4.3
    
    structure_standard: v9.4.3
    root_presence: true
    manifest:
      follows_standard: true
      config_location: centralized  # Uses operation_system/configs
    permissions:
      bus_publish: [BUS_KNOWLEDGE]
      state_ownership: [] # Static Knowledge
    
    dependencies: [] # Static Knowledge Base
    
    # Knowledge Storage (similar to MSP's chains)
    chains:
      folders: [genesis_knowledge_system]  # Genesis/Master/Safety Blocks storage
      files:
        - genesis_knowledge_system/Master_Block.json
        - genesis_knowledge_system/Framework_Genesis_Block.json
        - genesis_knowledge_system/Algorithm_How_Genesis_Block.json
        - genesis_knowledge_system/Concept_Why_Genesis_Block.json
        - genesis_knowledge_system/Parameter_What_Genesis_Block.json
        - genesis_knowledge_system/Protocol_Process_Genesis_Block.json
        - genesis_knowledge_system/Safety_Block.json

  - id: RMS
    name: Resonance_Memory_System
    version: 6.2.0  # Independent versioning (not mapped from EVA)
    domain: memory_filtration
    role: system_authority
    criticality: L2 # Unfiltered (Raw input/output)
    root_presence: true
    manifest:
      folders: [resonance_memory_system/configs, resonance_memory_system/contract]
      files: [resonance_memory_system/rms.py]
    permissions:
      bus_subscribe: [BUS_ALL]
      state_ownership: [rms_state.json]
    dependencies:
      - system: Resonance_Bus

  - id: Artifact_Qualia
    name: Artifact_Qualia
    version: 2.4.3  # Updated from 2.3.0 (matches code)
    domain: phenomenology
    role: core_system
    
    structure_standard: v9.4.3
    root_presence: true
    manifest:
      follows_standard: true
      config_location: local
      folders: [artifact_qualia/Module, artifact_qualia/configs]  # Module/ exists, Node/ needed
      files: [artifact_qualia/artifact_qualia.py]
    permissions:
      bus_publish: [BUS_PHENOMENOLOGICAL]
      state_ownership: [artifact_qualia_state.json]
    dependencies:
      - system: Resonance_Bus

  - id: AgenticRAG
    name: AgenticRAG
    version: 1.1.0  # Independent versioning (not mapped from EVA)
    domain: knowledge_retrieval
    role: central_module
    root_presence: false
    permissions:
      bus_subscribe: [BUS_KNOWLEDGE]

  - id: Resonance_Bus
    name: Resonance_Bus
    version: 2.4.3  # Maps from EVA 9.4.3 (core infrastructure)
    domain: transport
    role: central_module
    root_presence: false # Lives in operation_system
    manifest:
      files: [operation_system/resonance_bus.py]
    channels:
      - BUS_PHYSICAL
      - BUS_PSYCHOLOGICAL
      - BUS_PHENOMENOLOGICAL
      - BUS_KNOWLEDGE

  - id: Identity_Manager
    name: Identity_Manager
    version: 2.4.0  # Maps from EVA 9.4.0
    domain: security
    role: central_module
    root_presence: false # Lives in operation_system
    manifest:
      files: [operation_system/identity_manager.py]
    dependencies: [] # Standalone Utility



# ============================================================
# 4. CAPABILITIES REGISTRY (The Skills)
# ============================================================
capabilities:
  services:
    - id: AgenticRAG
      active: true
      domain: knowledge_retrieval
      path: capabilities/services/agentic_rag
      description: "Autonomous RAG service with tool use"
      dependencies:
        - service: Vector_Bridge
        - service: SLM_Bridge
        - system: Orchestrator
      permissions:
        bus_subscribe: [BUS_KNOWLEDGE]
        bus_publish: [BUS_KNOWLEDGE]
      criticality: L2

    - id: Engram_System
      active: true
      domain: memory_optimization
      path: capabilities/services/engram_system
      description: "O(1) high-frequency memory cache"
      dependencies:
        - system: MSP
      permissions:
        bus_subscribe: [BUS_PSYCHOLOGICAL] # Listen for high-arousal events
      criticality: L3 # Enhancement only

    - id: SLM_Bridge
      active: true
      domain: cognitive_interface
      path: capabilities/services/slm_bridge
      description: "Small Language Model interface (Qwen/Llama)"
      dependencies: [] # Standalone bridge
      permissions:
        bus_publish: []
      criticality: L2 # Bridge for L2 systems

    - id: Vector_Bridge
      active: true
      domain: memory_storage
      path: capabilities/services/vector_bridge
      description: "ChromaDB vector store interface"
      dependencies: [] # Standalone bridge
      permissions:
        bus_publish: []
      criticality: L2

    - id: Graph_Bridge
      active: false
      domain: knowledge_representation
      path: capabilities/services/graph_bridge
      description: "Knowledge graph interface (Future)"
      dependencies: []
      permissions: []
      criticality: L3

  tools:
    - id: Archivist
      active: true
      type: subagent
      domain: maintenance
      path: capabilities/tools/subagents/archivist_subagent.py
      description: "System maintenance and rule synchronization"
      dependencies: [registry/eva_master_registry.yaml]
      permissions: [fs_write]

    - id: RIS
      active: true
      type: subagent
      domain: audit
      path: capabilities/tools/subagents/ris_subagent.py
      description: "Resonance Integrity Subagent (Structure/Config Auditor)"
      dependencies: [registry/eva_master_registry.yaml]
      permissions: [fs_read] # Auditor only reads

    - id: Technician
      active: true
      type: subagent
      domain: development
      path: capabilities/tools/subagents/technician_subagent.py
      description: "Mass code modification specialist"
      dependencies: [task_order.yaml]
      permissions: [fs_write, fs_read]
