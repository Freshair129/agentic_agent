schema: EVA-MasterRegistry-v9.6
master_link: registry/master_configs.yaml
description: >
  The ULTIMATE Registry (The Map & The Law combined).
  Defines Existence (Topology), Structure (Manifest), and Rights (Permissions).
  Single Source of Truth for Subagent Auditing.
  Global metadata (Paths, Versions) are offloaded to Master Configs.

# ============================================================
# 1. GLOBAL POLICIES (The Constitution)
# ============================================================
policies:
  governance:
    root_slot_strictness: true    # Only root_slots allowed at agent/
    manifest_enforcement: true    # Files must match manifest
  
  memory:
    flow_direction: "Forward-Only"
    archive_immutability: true
    state_isolation: true

  # [Cognitive Standards]
  cognitive_standards:
    flow_current: "Cognitive_Flow_2_0"
    organism_epoch: "Resonance" # Grounded in master_configs
    core_model: "Bio-Driven Embodied Cognition (CIM-Injector / Bus-Reader)"

  # [Boot Order: The Awakening Sequence]
  runtime_sequence:
    1: Identity_Manager  # Security First (Who am I?)
    2: Resonance_Bus     # Transport Layer (Connect everyone)
    3: PhysioCore        # Body (Heartbeat must start)
    4: EVA_Matrix        # Mind (Psychology follows Physiology)
    5: MSP               # Memory (Soul wakes up)
    6: GKS               # Knowledge (Wisdom loads)
    7: RMS               # Filter (Perception starts)
    8: Artifact_Qualia   # Senses (Phenomenology online)
    9: Orchestrator      # CNS (Conductor raises baton)


# ============================================================
# 2. ROOT SLOT WHITE LIST (The Land)
# ============================================================
root_slots:
  # === GOVERNANCE & INFRASTRUCTURE ===
  - name: .agent
    type: governance
    description: Agent rules, workflows, and subagent configs
  
  - name: registry
    type: governance
    description: Master registry and versioning
  
  - name: contracts
    type: governance
    description: Interface definitions
  
  - name: docs
    type: knowledge
    description: Documentation and wisdom
  
  # === BIOLOGICAL ORGANS ===
  - name: physio_core
    type: organ
    authority: biological
    description: Body simulation (hormones, vitals)
  
  - name: eva_matrix
    type: organ
    authority: psychological
    description: Psychological state (9D emotions)
  
  - name: artifact_qualia
    type: organ
    authority: phenomenological
    description: Sensory experience
  
  # === INFRASTRUCTURE SYSTEMS ===
  - name: operation_system
    type: infra
    authority: transport
    description: Resonance Bus, Identity Manager
  
  - name: orchestrator
    type: infra
    authority: control
    description: Central Nervous System, CIM
  
  - name: resonance_memory_system
    type: infra
    authority: encoding
    description: State snapshot and resonance
  
  # === MEMORY & KNOWLEDGE ===
  - name: memory_n_soul_passport
    type: memory
    authority: archival
    description: Episodic/Semantic/Sensory storage
  
  - name: genesis_knowledge_system
    type: knowledge
    authority: reasoning
    description: Strategic knowledge base
  
  # === EXECUTION LAYER ===
  - name: api
    type: infra
    description: Web/Socket Layer
  
  - name: capabilities
    type: infra
    description: Tools/Skills/Services
  
  - name: consciousness
    type: memory
    description: Active working memory (RAM)
    manifest:
      folders:
        - consciousness/context_container
        - consciousness/state_memory
        - consciousness/data
      files:
        - consciousness/README.md
  
  - name: memory # Archival Storage
    type: memory
    description: Archival Storage
  - scripts           # Verification & utility scripts
  - tests             # Verification Suite
  - tools             # Technician Subagents

# ============================================================
# 3. SYSTEMS REGISTRY (The Citizens)
# ============================================================
systems:
  # ----------------------------------------------------------
  # 1. BIOLOGICAL DOMAIN (PhysioCore)
  # ----------------------------------------------------------
  - id: PhysioCore
    name: Physiological_Core
    version: 2.4.3  # Maps from EVA 9.4.3 (9.x -> 2.x per ADR-011)
    domain: biological
    role: system_authority
    auth_doc: docs/04_Systems/physio_core/circulation_blood_physiology_overview.md
    runtime:
      sequence: 3
    
    # [Manifest: Structure]
    # NOTE: PhysioCore is a STRUCTURAL EXCEPTION (ADR-015, ADR-017)
    # Uses legacy logic/ directory, not v9.4.3 Module/Node structure
    # Reason: Verified Stable + Performance Critical (30Hz loop)
    structure_standard: exception
    exception_reason: "Performance critical (30Hz loop), Verified Stable, ADR-015"
    root_presence: true
    manifest:
      follows_standard: false
      config_location: local
      folders:
        - physio_core/logic           # Legacy structure (22 files)
        - physio_core/configs
        - physio_core/contract
        - physio_core/schema
        - physio_core/validation
        - physio_core/tests
      files:
        - physio_core/physio_core.py
        - physio_core/physio_core.py
        - physio_core/__init__.py
      entry_point: physio_core.physio_core.PhysioCore
    
    # [Permissions: Rights]
    permissions:
      bus_publish: [BUS_PHYSICAL]
      bus_subscribe: []
      state_ownership: [physio_core_state.json]
    
    # [Contracts: Data Flow] (User's 'input/from', 'output/deliver')
    contracts:
      inputs:
        - data: "StimulusVector"
          source: "Orchestrator" # from: {system_id}
          channel: "BUS_PHYSICAL"
      outputs:
        - data: "HormonePanel"
          target: "EVA_Matrix"   # deliver: {system_id}
          channel: "BUS_PHYSICAL"
        - data: "VitalsData"
          target: "EVA_Matrix"
          channel: "BUS_PHYSICAL"

    # [Dependencies: Needs]
    dependencies: [] # Foundational System (No external deps)
    
    # [Components: Modules]
    modules:
      - id: Endocrine_Engine
        type: functional_module
        domain: biological.endocrine
        auth_doc: docs/04_Systems/physio_core/ENDOCRINE_LOGIC.md
        criticality: L0 # Hormone foundation
        nodes:
          - id: EndocrineController
            role: Orchestrator node for endocrine glands
          - id: EndocrineGland
            role: Biological unit node for hormone production
          - id: HPARegulator
            role: Homeostatic feedback node (Stress-Cortex loop)
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]
        runtime:
          sequence: "3_ASYNC_A"

      - id: Blood_Engine
        type: functional_module
        domain: biological.blood
        auth_doc: docs/04_Systems/physio_core/circulation_blood_physiology_overview.md
        criticality: L0 # Transport foundation
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]
        runtime:
          sequence: "3_ASYNC_B"

      - id: ANS_Engine
        type: functional_module
        domain: biological.autonomic
        auth_doc: docs/04_Systems/physio_core/circulation_blood_physiology_overview.md
        criticality: L0 # Reflex foundation
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]
        runtime:
          sequence: "3_ASYNC_C"

      - id: Vitals_Engine
        type: functional_module
        domain: biological.vitals
        auth_doc: docs/04_Systems/physio_core/circulation_blood_physiology_overview.md
        criticality: L0 # Life sign foundation
        dependencies:
          - system: PhysioCore
        communication:
          publishes: [BUS_PHYSICAL]

  # ----------------------------------------------------------
  # 2. PSYCHOLOGICAL DOMAIN (Matrix)
  # ----------------------------------------------------------
  - id: EVA_Matrix
    name: EVA_Matrix
    version: 2.5.0  # MINOR Bump: Structural refactor to V9 hierarchy
    domain: psychological
    role: core_system
    auth_doc: docs/04_Systems/eva_matrix/matrix_logic_concept.md
    
    structure_standard: v9.4.3
    root_presence: true
    manifest:
      follows_standard: true
      config_location: local
      folders: [eva_matrix/Module]
      files: [eva_matrix/eva_matrix.py]
      entry_point: eva_matrix.eva_matrix.EVAMatrixSystem
      
    permissions:
      bus_publish: [BUS_PSYCHOLOGICAL]
      bus_subscribe: [BUS_PHYSICAL]
      state_ownership: [eva_matrix_state.json]
    
    contracts:
      inputs:
        - data: "HormonePanel"
          source: "PhysioCore"
          channel: "BUS_PHYSICAL"
        - data: "VitalsData"
          source: "PhysioCore"
          channel: "BUS_PHYSICAL"
      outputs:
        - data: "EmotionalState (9D)"
          target: "Orchestrator"
          channel: "BUS_PSYCHOLOGICAL"

    dependencies:
      - system: PhysioCore # via BUS_PHYSICAL
    
    modules:
      - id: MatrixPsychModule
        type: functional_module
        auth_doc: docs/04_Systems/eva_matrix/PSYCH_ENGINE_LOGIC.md
        criticality: L1 # Core Logic
        nodes:
          - id: TransitionNode
            role: 9D state transition math provider
            path: eva_matrix/Module/psych_engine/Node/transition_node.py
        permissions:
          bus_subscribe: [BUS_PHYSICAL]
          bus_publish: [BUS_PSYCHOLOGICAL]
        runtime:
          sequence: 4 


  # ----------------------------------------------------------
  # 3. MEMORY DOMAIN (MSP)
  # ----------------------------------------------------------
  - id: MSP
    name: Memory_Soul_Passport
    version: 2.1.0  # Updated from 1.1.0 (2026-01-18: Version Control Baseline)
    domain: memory_persistence
    role: core_system
    auth_doc: docs/01_Philosophies/MEM_PHILOSOPHY_888.md
    runtime:
      sequence: 5
    
    # NOTE: MSP is a STRUCTURAL EXCEPTION (ADR-015, ADR-017)
    # Reason: Legacy system, 2454 lines, memory engine complexity, Verified Stable
    structure_standard: exception
    exception_reason: "Legacy memory engine (2454 lines), Verified Stable, ADR-015"
    root_presence: true
    manifest:
      follows_standard: false
      config_location: local
      folders: [memory_n_soul_passport/Module]
      files: [memory_n_soul_passport/memory_n_soul_passport_engine.py]
      entry_point: memory_n_soul_passport.memory_n_soul_passport_engine.MSP
      
    permissions:
      bus_publish: []
      bus_subscribe: [BUS_ALL] # Special right
      state_ownership: []      # MSP owns storage, not state
    
    dependencies:
      - system: Resonance_Bus
      - service: Vector_Bridge
      
    modules:
      - id: Episodic_Memory
        type: storage_module
        auth_doc: docs/01_Philosophies/MEM_PHILOSOPHY_888.md
        criticality: L1 # Identity Storage
        dependencies: [system: MSP]
        runtime:
          sequence: "5_ASYNC_A"
      - id: Semantic_Memory
        type: storage_module
        auth_doc: docs/01_Philosophies/MEM_PHILOSOPHY_888.md
        criticality: L1 # Knowledge Storage
        dependencies: [system: MSP, service: ChromaBridge]
        permissions:
          fs_write: [memory/semantic_memory]
        runtime:
          sequence: "5_ASYNC_B"

    chains:
      folders: [memory_n_soul_passport/archive]
      files: []
      
    protocols:
      - id: Memory_Philosophy_888
        name: Memory_Philosophy_and_888_Protocol
        path: docs/01_Philosophies/MEM_PHILOSOPHY_888.md
        criticality: L0_CRITICAL
      - id: Memory_Interface_Protocol
        name: Memory_Interface_Contract
        path: docs/protocols/MEMORY_INTERFACE_PROTOCOL.md
        criticality: L1_CORE


  # ----------------------------------------------------------
  # 4. ORCHESTRATION DOMAIN (CNS)
  # ----------------------------------------------------------
  - id: Orchestrator
    name: EVA_Orchestrator
    version: 1.3.0  # MINOR Bump: Major structural modularization
    domain: central_nervous_system
    role: system_authority
    auth_doc: docs/06_Orchestration/cognitive_flow/Cognitive_Flow_2_0.md
    runtime:
      sequence: 9
    
    structure_standard: v9.4.3
    root_presence: true
    manifest:
      follows_standard: true
      config_location: local
      folders: [orchestrator/Module, orchestrator/Execution, orchestrator/configs]
      files: [orchestrator/orchestrator.py]
      doc_folders: [docs/06_Orchestration/cim]
      entry_point: orchestrator.orchestrator.EVAOrchestrator
      
    permissions:
      bus_publish: [BUS_OPERATIONAL]
      bus_subscribe: [BUS_ALL]
      state_ownership: [cim_state.json]
    
    contracts:
      inputs:
        - data: "UserPrompt"
          source: "User"
          channel: "Direct"
        - data: "EmotionalState"
          source: "EVA_Matrix"
          channel: "BUS_PSYCHOLOGICAL"
      outputs:
        - data: "StimulusVector"
          target: "PhysioCore"
          channel: "BUS_PHYSICAL"
        - data: "FinalResponse"
          target: "User"
          channel: "Direct"

    dependencies:
      - system: PhysioCore
      - system: EVA_Matrix
      - system: MSP
      - system: GKS
      - system: RMS
      
    protocols:
      - id: Cognitive_Flow_2_0
        type: master_protocol
        description: "Standard Bio-Digital Gap Flow (CIM-Injector -> Bus-Reader)"
        owner: Orchestrator
        path: docs/06_Orchestration/cognitive_flow/Cognitive_Flow_2_0.md
        criticality: L0
      
    modules:
      - id: CIM_Module
        type: functional_module
        auth_doc: docs/06_Orchestration/cim/CIM_ORCHESTRATION_PHASES.md
        criticality: L0 # Context Loop
        nodes:
          - id: CIM_Node
            role: Context assembly and SLM initial guess
            path: orchestrator/Module/CIM/Node/cim_node.py
          - id: PromptRuleNode
            role: Persona grounding and rule enforcement
            path: orchestrator/Module/CIM/Node/prompt_rule/prompt_rule_node.py
        protocols:
          - id: Phase_3_Loopback (The Sponge)
            type: cognitive_loop
            description: "Post-Response state persistence, prediction, and self-note buffering for next turn."
            owner: CIM
            criticality: L2
    
    nodes:
      - id: Session_Node
        role: Session lifecycle and timeout management
        auth_doc: docs/06_Orchestration/SESSION_LIFECYCLE_CONTROL.md
        path: orchestrator/Node/session_node.py
    
    specialized_slots:
      - id: cognitive_flow
        type: execution_logic
        description: "CNS Master Flow Logic and Runtime Configuration"
        path: orchestrator/Execution/CognitiveFlow/

  # ----------------------------------------------------------
  # 5. INFRASTRUCTURE & KNOWLEDGE
  # ----------------------------------------------------------
  - id: GKS
    name: Genesis_Knowledge_System
    version: 2.0.0  # Maps from EVA 9.0.0 (introduced in v9)\n    domain: epistemology
    role: knowledge_authority
    auth_doc: genesis_knowledge_system/Master_Block.json # Knowledge Base is self-documenting in Blocks
    criticality: L2 # Ignorant (Cant access wisdom)
    runtime:
      sequence: 6
    
    structure_standard: v9.4.3
    
    structure_standard: v9.4.3
    root_presence: true
    manifest:
      follows_standard: true
    manifest:
      follows_standard: true
      config_location: centralized  # Uses operation_system/configs
      entry_point: genesis_knowledge_system.gks_interface.GKSInterface
    permissions:
      bus_publish: [BUS_KNOWLEDGE]
      state_ownership: [] # Static Knowledge
    
    dependencies: [] # Static Knowledge Base
    
    # Knowledge Storage (similar to MSP's chains)
    chains:
      folders: [genesis_knowledge_system]  # Genesis/Master/Safety Blocks storage
      files:
        - genesis_knowledge_system/Master_Block.json
        - genesis_knowledge_system/Framework_Genesis_Block.json
        - genesis_knowledge_system/Algorithm_How_Genesis_Block.json
        - genesis_knowledge_system/Concept_Why_Genesis_Block.json
        - genesis_knowledge_system/Parameter_What_Genesis_Block.json
        - genesis_knowledge_system/Protocol_Process_Genesis_Block.json
        - genesis_knowledge_system/Safety_Block.json

  - id: RMS
    name: Resonance_Memory_System
    version: 2.5.0  # MINOR Bump: Refactored to V9 Standard Hierarchy
    domain: memory_filtration
    role: system_authority
    auth_doc: docs/04_Systems/resonance_engine/RESONANCE_MEMORY_SYSTEM.md
    criticality: L2 # Unfiltered (Raw input/output)
    runtime:
      sequence: 7
    root_presence: true
    manifest:
      folders: [resonance_memory_system/configs, resonance_memory_system/contract, resonance_memory_system/Module]
      files: [resonance_memory_system/resonance_memory_system.py]
      entry_point: resonance_memory_system.resonance_memory_system.ResonanceMemorySystem
    permissions:
      bus_subscribe: [BUS_ALL]
      state_ownership: [rms_state.json]
    dependencies:
      - system: Resonance_Bus
    
    # [Components: Modules]
    modules:
      - id: Resonance_Encoding_Module
        type: functional_module
        domain: memory_filtration.encoding
        auth_doc: docs/04_Systems/resonance_engine/RESONANCE_MEMORY_SYSTEM.md
        criticality: L2
        nodes:
          - id: ColorGenerationNode
            role: Mapping 9D axes to R/G/B memory colors
          - id: IntensityCalculationNode
            role: Quantifying affective load and salience
          - id: TraumaProtectionNode
            role: Gating memory depth during high threat

      - id: Latching_Module
        type: functional_module
        domain: memory_filtration.latching
        auth_doc: docs/04_Systems/resonance_engine/RESONANCE_MEMORY_SYSTEM.md
        criticality: L2
        nodes:
          - id: TemporalSmoothingNode
            role: Recursive smoothing of affective signals (alphas)
          - id: OutputPackagingNode
            role: Formatting snapshots for Episodic/Sensory archives

  - id: Artifact_Qualia
    name: Artifact_Qualia (AQI)
    version: 2.5.0  # MINOR Bump: Structural refactor to V9 hierarchy
    domain: phenomenology
    role: core_system
    auth_doc: docs/03_Architecture/CONSCIOUSNESS_DOMAIN_STRUCTURE.md # Qualia defines sensory awareness
    
    structure_standard: v9.4.3
    root_presence: true
    manifest:
      follows_standard: true
      config_location: local
      folders: [artifact_qualia/Module, artifact_qualia/configs]
      files: [artifact_qualia/artifact_qualia.py]
      entry_point: artifact_qualia.artifact_qualia.ArtifactQualiaSystem
    permissions:
      bus_publish: [BUS_PHENOMENOLOGICAL]
      state_ownership: [artifact_qualia_state.json]
    dependencies:
      - system: Resonance_Bus

  - id: AgenticRAG
    name: AgenticRAG
    version: 1.1.0  # Independent versioning (not mapped from EVA)
    domain: knowledge_retrieval
    role: central_module
    auth_doc: docs/05_Capabilities/AGENTIC_RAG_ENGINE.md # Placeholder or actual doc link
    root_presence: false
    permissions:
      bus_subscribe: [BUS_KNOWLEDGE]

  - id: Resonance_Bus
    name: Resonance_Bus
    version: 2.4.3  # Maps from EVA 9.4.3 (core infrastructure)
    domain: transport
    role: central_module
    root_presence: false # Lives in operation_system
    manifest:
      files: [operation_system/resonance_bus.py]
    channels:
      - BUS_PHYSICAL
      - BUS_PSYCHOLOGICAL
      - BUS_PHENOMENOLOGICAL
      - BUS_KNOWLEDGE

  - id: Identity_Manager
    name: Identity_Manager
    version: 2.4.0  # Maps from EVA 9.4.0
    domain: security
    role: central_module
    root_presence: false # Lives in operation_system
    manifest:
      files: [operation_system/identity_manager.py]
    dependencies: [] # Standalone Utility

  - id: NexusMind
    name: Nexus_Mind_Engine
    version: 1.0.0
    domain: reasoning
    role: central_module
    root_presence: false
    manifest:
      folders: [operation_system/nexus_mind]
      files: [operation_system/nexus_mind/nexus_mind_engine.py]
      entry_point: operation_system.nexus_mind.nexus_mind_engine.NexusMindEngine

  - id: User_Registry
    name: User_Registry
    version: 1.0.0
    domain: identity_management
    role: central_module
    root_presence: false
    manifest:
      files: [memory_n_soul_passport/user_registry_manager.py]
    permissions:
      fs_write: [memory/user_registry.json]



# ============================================================
# 4. CAPABILITIES REGISTRY (The Skills)
# ============================================================
capabilities:
  services:
    - id: AgenticRAG
      active: true
      domain: knowledge_retrieval
      path: capabilities/services/agentic_rag
      description: "Autonomous RAG service with tool use"
      auth_doc: docs/05_Capabilities/services/agentic_rag/Agentic_RAG_CONCEPT.md
      dependencies:
        - service: Vector_Bridge
        - service: SLM_Bridge
        - system: Orchestrator
      permissions:
        bus_subscribe: [BUS_KNOWLEDGE]
        bus_publish: [BUS_KNOWLEDGE]
      criticality: L2

    - id: Engram_System
      active: true
      domain: memory_optimization
      path: capabilities/services/engram_system
      description: "O(1) high-frequency memory cache"
      dependencies:
        - system: MSP
      permissions:
        bus_subscribe: [BUS_PSYCHOLOGICAL] # Listen for high-arousal events
      auth_doc: docs/05_Capabilities/services/ENGRAM_SYSTEM.md
      criticality: L3 # Enhancement only

    - id: SLM_Bridge
      active: true
      domain: cognitive_interface
      path: capabilities/services/slm_bridge
      description: "Small Language Model interface (Qwen/Llama)"
      dependencies: [] # Standalone bridge
      permissions:
        bus_publish: []
      auth_doc: docs/05_Capabilities/services/SLM_BRIDGE.md
      criticality: L2 # Bridge for L2 systems

    - id: Vector_Bridge
      active: true
      domain: memory_storage
      path: capabilities/services/vector_bridge
      description: "ChromaDB vector store interface"
      auth_doc: docs/05_Capabilities/services/VECTOR_BRIDGE.md
      dependencies: [] # Standalone bridge
      permissions:
        bus_publish: []
      criticality: L2

    - id: Graph_Bridge
      active: false
      domain: knowledge_representation
      path: capabilities/services/graph_bridge
      description: "Knowledge graph interface (Future)"
      dependencies: []
      permissions: []
      auth_doc: docs/05_Capabilities/services/graph_bridge/GRAPH_BRIDGE_CONCEPT.md
      criticality: L3

  tools:
    - id: Archivist
      active: true
      type: subagent
      domain: maintenance
      path: capabilities/tools/subagents/archivist_subagent.py
      description: "System maintenance and rule synchronization"
      dependencies: [registry/eva_master_registry.yaml]
      auth_doc: docs/05_Capabilities/tools/ARCHIVIST_SUBAGENT.md
      permissions: [fs_write]

    - id: RIS
      active: true
      type: subagent
      domain: audit
      path: capabilities/tools/subagents/ris_subagent.py
      description: "Resonance Integrity Subagent (Structure/Config Auditor)"
      dependencies: [registry/eva_master_registry.yaml]
      auth_doc: docs/05_Capabilities/tools/RIS_SUBAGENT.md
      permissions: [fs_read] # Auditor only reads

    - id: Technician
      active: true
      type: subagent
      domain: development
      path: capabilities/tools/subagents/technician_subagent.py
      description: "Mass code modification specialist"
      dependencies: [task_order.yaml]
      auth_doc: docs/05_Capabilities/tools/TECHNICIAN_SUBAGENT.md
      auth_doc: docs/05_Capabilities/tools/TECHNICIAN_SUBAGENT.md
      permissions: [fs_write, fs_read]

    - id: Logger
      active: true
      type: utility
      domain: infrastructure
      path: capabilities/tools/logger.py
      description: "Standardized thread-safe logging interface"
      auth_doc: docs/05_Capabilities/tools/LOGGER.md
      permissions: [fs_write]

    - id: MSPMonitor
      active: true
      type: utility
      domain: audit
      path: capabilities/tools/msp_monitor.py
      description: "Real-time MSP storage and health monitor"
      auth_doc: docs/05_Capabilities/tools/MSP_MONITOR.md
      permissions: [fs_read]


# ============================================================
# 5. RUNTIME EXECUTION FLOW (The Generated Graph)
# ============================================================
# This section consolidates the 'runtime.sequence' and 'entry_point'
# from all Systems/Modules into a single Executable Plan.
# Usage: Orchestrator reads this to boot the organism.
# ------------------------------------------------------------
execution_graph:
  boot_flow:
    # --- Step 1: Identity ---
    - step: 1
      mode: serial
      system: Identity_Manager
      entry_point: operation_system.identity_manager.IdentityManager

    # --- Step 2: Transport ---
    - step: 2
      mode: serial
      system: Resonance_Bus
      entry_point: operation_system.resonance_bus.ResonanceBus
    
    # --- Step 3: Biology (Parallel) ---
    - step: 3
      mode: parallel_group
      description: "Awaken PhysioCore and Sub-Engines"
      targets:
        - id: PhysioCore
          role: controller
          entry_point: physio_core.physio_core.PhysioCore
        - id: Endocrine_Engine
          role: async_module
          group: 3_ASYNC_A
        - id: Blood_Engine
          role: async_module
          group: 3_ASYNC_B
        - id: ANS_Engine
          role: async_module
          group: 3_ASYNC_C
        - id: Vitals_Engine
