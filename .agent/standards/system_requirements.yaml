        description: "All MSP writes validated against JSON Schema before persistence"
        status: "Enforced"

      - name: "NFR5 — Consciousness/Subconscious Separation"
        description: "LLM cannot write to memory/ directly — must use propose_episodic_memory() tool"
        status: "Enforced (Constitutional Principle)"

