    role: "Central Nervous System — coordinates all systems, runs Cognitive Flow"
    key_components:
      - "Execution/CognitiveFlow/master_flow_engine.py — MasterFlowEngine (run_turn pipeline)"
      - "Module/CIM/ — Context Injection Module (file injector)"
      - "Module/CIM/Node/prompt_rule/ — Identity/persona governance (PRN)"
      - "Node/session_node.py — Session lifecycle management"

  - system: "PhysioCore"
    id: "SYSTEM_PHYSIO"
    location: "physio_core/"
    version: "2.4.3"
    role: "Biological simulation — 23 chemicals (16 hormones + 7 neurotransmitters)"
    key_components:
      - "logic/endocrine/ — Hormone secretion + metabolism"
      - "logic/blood/ — 30Hz blood distribution"
      - "logic/receptor/ — Ligand-receptor transduction"
      - "logic/vitals/ — HR, RPM, Vagus Tone"
      - "logic/reflex/ — ANS fight/flight"
