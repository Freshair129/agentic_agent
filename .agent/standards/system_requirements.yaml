    axes: ["stress", "warmth", "drive", "clarity", "joy", "alertness", "connection", "groundedness", "openness"]
    config: "configs/EVA_Matrix_configs.yaml"

  - system: "Artifact Qualia"
    id: "SYSTEM_QUALIA"
    location: "artifact_qualia/"
    role: "Phenomenological layer — texture, color, soundscape"

  - system: "Resonance Memory System (RMS)"
    id: "SYSTEM_RMS"
    location: "resonance_memory_system/"
    role: "Encode psychological state → memory-storable values (color, intensity, trauma protection)"
    encoding_levels: ["L0_trace", "L1_light", "L2_standard", "L3_deep", "L4_trauma"]
    trauma_threshold: 0.85

  - system: "Memory & Soul Passport (MSP)"
    id: "SYSTEM_MSP"
    location: "memory_n_soul_passport/"
    version: "2.1.0"
    lines: 2633
    role: "Central memory system — episodic, semantic, sensory memory with schema validation"
    modules:
      - "Module/EpisodicMemory/ — JournalNode (episodes/, episodes_user/, episodes_ai/)"
      - "Module/SemanticMemory/ — GroundingNode (belief revision: hypothesis → confirmed)"
      - "Module/SensoryMemory/ — QualiaStorageNode"
    schemas: 20
    config: "configs/MSP_configs.yaml"

  - system: "Resonance Bus"
    id: "SYSTEM_BUS"
    location: "operation_system/resonance_bus.py"
    role: "Pub/sub event bus — all inter-system communication"
    channels:
      - "bus:physical (PhysioCore → Matrix)"
      - "bus:psychological (Matrix → Qualia)"
      - "bus:phenomenological (Qualia → MSP)"
      - "bus:knowledge (RAG ↔ MSP)"
      - "bus:cognitive (GKS/NexusMind — NOT YET ACTIVE)"
      - "bus:temporal (Temporal Engine — NOT YET ACTIVE)"

  - system: "Identity Manager"
    id: "SYSTEM_IDM"
    location: "operation_system/identity_manager.py"
    version: "2.4.0"
    role: "Centralized ID factory — ALL system IDs, bus channels, personas"

  - system: "LLM Bridge"
    location: "operation_system/llm_bridge/"
    role: "LLM API abstraction (Gemini + Ollama)"
    tools:
      - "SYNC_BIOCOGNITIVE_STATE_TOOL — Phase 1 → Gap"
      - "PROPOSE_EPISODIC_MEMORY_TOOL — Phase 2 → MSP"

  - system: "Genesis Knowledge System (GKS)"
    id: "SYSTEM_GKS"
    status: "NOT YET IMPLEMENTED"
    note: "Defined in registry and IdentityManager but genesis_knowledge_system/ directory does not exist"

