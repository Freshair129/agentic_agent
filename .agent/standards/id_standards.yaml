# ─────────────────────────────────────────────────────────
# NAMING CONVENTIONS
# ─────────────────────────────────────────────────────────

naming_conventions:

  files:
    - pattern: "snake_case.py"
      example: "physio_core.py, eva_matrix.py"
    - pattern: "{Module}_configs.yaml"
      example: "PhysioCore_configs.yaml, EVA_Matrix_configs.yaml"
    - pattern: "{Module}_Payload_Schema_v2.json"
      example: "MSP_Payload_Schema_v2.json"
    - pattern: "test_{module}_init.py"
      example: "test_msp_phase1.py"

  code:
    functions: "snake_case (e.g., get_state, write_episode)"
    private_functions: "_prefix (e.g., _initialize_chat, _decay)"
    variables: "snake_case (e.g., hormone_levels, body_state)"
    constants: "UPPER_SNAKE_CASE (e.g., BUS_PHYSICAL, SYSTEM_MSP)"
    classes: "PascalCase (e.g., PhysioCore, LLMBridge, EndocrineController)"
    engine_suffix: "Common for system entry points (BloodEngine, ReceptorEngine)"

  logging:
    format: "[MODULE] [LEVEL] Message"
    example: "[PhysioCore] [INFO] Dopamine: 0.75"
    import: "from capabilities.tools.logger import safe_print"
    usage: "print = safe_print  # override built-in per module"

  versioning:
    system: "MAJOR.MINOR.PATCH (e.g., 9.6.2)"
    module: "Decoupled per ADR-011 (e.g., PhysioCore v2.4.3)"
    commit: "[Module] Description (e.g., [Docs] v9.6.2: Established Cognitive Flow 2.0)"

# ─────────────────────────────────────────────────────────
# RULE: Never Hardcode
# ─────────────────────────────────────────────────────────

never_hardcode:
  - "System IDs → Use IdentityManager.SYSTEM_*"
  - "Bus channels → Use IdentityManager.BUS_*"
  - "File paths → Load from YAML config"
  - "Magic numbers → Define in YAML"
  - "Persona names → Use IdentityManager.PERSONA_MAP"
