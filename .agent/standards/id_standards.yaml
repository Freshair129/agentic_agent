      EVA: "PE_01"
      LYRA: "PE_02"

# ─────────────────────────────────────────────────────────
# DOMAIN: Turn & Session IDs
# ─────────────────────────────────────────────────────────

session_identifiers:

  - name: "Turn ID"
    format: "TURN_{session_id}_{index:03d}"
    example: "TURN_SES_1_001"
    generated_by: "IdentityManager"
    description: "Unique identifier for each conversation turn"

  - name: "Session ID"
    format: "SES_{dev_id}_SP{sphere}C{core}_SS{session}"
    example: "SES_THA-06_SP1C1_SS7"
    generated_by: "SessionNode"
    description: "Session boundary — encompasses multiple turns"

  - name: "Context ID"
    format: "ctx_{session_seq}_{episodic_id}.md"
    example: "ctx_5_EVA_EP27.md"
    generated_by: "CIM"
    description: "Context file identifier for CIM injection"

# ─────────────────────────────────────────────────────────
# DOMAIN: Memory IDs
# ─────────────────────────────────────────────────────────

memory_identifiers:

  - name: "Episode ID"
    format: "{PERSONA}_EP{seq:02d}"
    example: "EVA_EP01"
    generated_by: "MSP"
    description: "Unique episodic memory identifier"
    counter_file: "consciousness/indexes/episode_counter.json"

  - name: "Memory Identifier"
    format: "{dev_id}_SP{sphere}C{core}_SES{session}"
    example: "THA-06_SP1C1_SES7"
    description: "Full memory address in 8-8-8 hierarchy"

  - name: "Semantic Memory ID"
    format: "SEM_{concept_hash}_{seq:03d}"
    example: "SEM_auth_pattern_001"
    generated_by: "SemanticMemoryModule"
    description: "Semantic concept identifier"

  - name: "Core Memory ID"
    format: "CORE_{topic}_{seq:03d}"
    example: "CORE_identity_001"
    generated_by: "MSP (distillation)"
    description: "Tier 2 distilled memory"

  - name: "Sphere Memory ID"
    format: "SPHERE_{scope}_{seq:03d}"
    example: "SPHERE_social_001"
    generated_by: "MSP (promotion)"
    description: "Tier 3 long-term wisdom"

# ─────────────────────────────────────────────────────────
# DOMAIN: User IDs
# ─────────────────────────────────────────────────────────

user_identifiers:

  - name: "User ID"
    format: "U_{seq:03d}"
    example: "U_001"
    generated_by: "UserRegistryManager"
    stored_in: "memory/user_registry.json"
    description: "Registered user identifier"

  - name: "Developer ID"
    format: "{PREFIX}-{seq:02d}"
    example: "THA-06"
    stored_in: "registry/master_configs.yaml"
    description: "Developer/creator identifier"

  - name: "Persona ID"
    format: "PE_{seq:02d}"
    example: "PE_01"
    stored_in: "IdentityManager.PERSONA_MAP"
    description: "Agent persona identifier"

# ─────────────────────────────────────────────────────────
# DOMAIN: Changelog IDs
# ─────────────────────────────────────────────────────────

changelog_identifiers:

  - name: "Changelog Entry ID"
    format: "CL-{YYYYMMDD}-{NNN}"
    example: "CL-20260319-001"
    serial: "3-digit zero-padded, reset per day"
    description: "Individual changelog entry identifier"

# ─────────────────────────────────────────────────────────
# DOMAIN: RMS Encoding
# ─────────────────────────────────────────────────────────

encoding_identifiers:

  - name: "Memory Encoding Level"
    values:
      - "L0_trace (< 0.40) — ลืมง่าย"
      - "L1_light (< 0.65) — จำได้บ้าง"
      - "L2_standard (< 0.85) — จำได้ดี"
      - "L3_deep (>= 0.85) — จำฝังลึก"
      - "L4_trauma (>= 0.85 + threat > 0.85) — trauma memory"

  - name: "Memory Color"
    format: "#RRGGBB"
    description: "Hex color derived from 5D resonance_texture (stress, warmth, clarity, drive, calm)"

